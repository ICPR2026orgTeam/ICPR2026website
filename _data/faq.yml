- question : "I am concerned that my registration payment via bank transfer or purchase order may not arrive before April 13. Is it possible to get a deadline extension?"
  answer : "No deadline extensions are planned. However, we accept payments made by bank transfer or purchase order as long as they are initiated in time for banks to complete the transaction properly. We understand that your payment may arrive with a slight delay. The payment is considered valid once it has been initiated. In all cases, the most important point is that it is initiated before April 13."
  category : "registration"
 

- question : "When will the travel stipend results be announced?"
  answer : "The IAPR Secretary Josep Llados is planning to have the evaluation of stipend applications ready so notification can be sent out on Monday morning 13 April CET."
  category: "registration"
  
- question : "What is the deadline time for author registration on 13 April?"
  answer: "A full registration must have been received for each paper no later than on 13 April at 23:59 AoE."   
  category: "registration"

- question : "If I have already registered and thereafter is awarded an IAPR Travel Stipend may I be waived the paid registration fee?"
  answer: "Yes, that will be handled by the ICPR organisers."
  category: "registration"


- question: "I am a current member of the British Machine Vision Association (BMVA), which is the UK member society of IAPR. Could you please confirm that I am eligible to register under the “IAPR member” category?"
  answer: |
    Yes, as a member of the BMVA (a member society of IAPR), you are eligible to register under the “IAPR member” category. If you have any doubts, you can consult the list of IAPR member societies on the official <a href="https://iapr.org/about-us/iapr-membership/"> IAPR website</a>.
  category: "registration"
  
- question: "Has my paper been accepted for oral or poster presentation?"
  answer: "The program has not been set yet with partition of papers into oral and poster sessions. The Track Chairs will work on this during May when the camera-ready papers have been well received by Springer. Please note that the distinction between oral and poster papers will not depend on quality, but rather on suitability in the scientific program. Regardless of presentation type, all accepted papers are eligible for the Best Paper Award – and, additionally, the Best Student Paper Award, if the main author is a student. "
  category: "participation"

- question: "I need a visa to enter France. How do I obtain an invitation letter for conference visa?"
  answer: |
   For any request for a letter of invitation, please <a href="mailto:contactcolloque@insavalor.fr">contactcolloque@insavalor.fr</a>. In order to issue the letter of invitation, you will be required to pay the full amount of your registration fee.
  category: "registration"


- question: "Do we need to follow the 15-page limit, the page margins, and the font size in the Springer LNCS template for our manuscript?"
  answer: "Yes, otherwise Springer will reject the paper upon uploading. Parts of text, tables, and figures that are out-of-bound of the Springer LNCS margins will not be visible in a camera-ready version. According to common layout rules, a manuscript should be readable without having to zoom in. Hence, the font size is to be followed not only in text but also in tables and figures. We anticipate that it should be possible to present your accepted paper in an explanatory way within the allowed 15 pages without pushing limits."
  category: "cameraready"
 

- question: "Will it be possible to attend the conference remotely?"
  answer: "No, presentations re intended to be onsite. Per the author instructions during submission, there is attendance responsibility that the authors agreed to: If the paper is accepted, then at least one of the authors will register for the conference and present the paper."
  category: "participation"



- question: "Will there be any travel stipends for ICPR 2026?"
  answer: "Yes, a limited number of IAPR Travel Stipends will be available for students to apply for <a href=\"https://forms.gle/ih1PJsHgoiFKYNWFA\">here</a>."
  category: "participation"
   
- question : "Is it possible to register the paper with student registration option only?"
  answer : "No, each paper needs a FULL registration. However, one full registration can cover up to three papers at ICPR 2026."
  category: "registration"

- question : "Can an author registered as student present the paper at ICPR 2026 if a co-author has full registration?"
  answer: "Yes, as long as there is one full registration for the paper, any author can present the paper. In fact, we encourage supervisors to let their students come forward at ICPR 2026."
  category: "registration"


- question : "Is it possible to add an author or to change the author order for the camera-ready version?"
  answer : "No, this is not allowed."
  category: "cameraready"




